<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecógrafo Móvil — Registro de Uso</title>
<style>
  :root{
    --ink:#0f1b2d;
    --paper:#f6f4ee;
    --line:#d8d3c4;
    --ok:#1f6f4a;
    --ok-bg:#e7f2ec;
    --warn:#b5481f;
    --warn-bg:#fbe9e1;
    --muted:#6b6457;
    --mono:'IBM Plex Mono','SF Mono',Consolas,monospace;
    --sans:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:20px 16px 60px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 4px;
  }
  h1{
    font-size:21px;
    line-height:1.25;
    margin:0 0 18px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .tag{
    display:inline-block;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.08em;
    border:1px solid var(--line);
    padding:2px 7px;
    border-radius:3px;
    color:var(--muted);
    margin-bottom:10px;
  }

  /* status card */
  .status{
    border:1px solid var(--line);
    border-left:5px solid var(--ok);
    background:var(--ok-bg);
    border-radius:4px;
    padding:16px 16px 14px;
    margin-bottom:18px;
  }
  .status.busy{
    border-left-color:var(--warn);
    background:var(--warn-bg);
  }
  .status-label{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:600;
  }
  .status.busy .status-label{color:var(--warn);}
  .status:not(.busy) .status-label{color:var(--ok);}
  .status-detail{
    margin-top:8px;
    font-size:14px;
    line-height:1.55;
  }
  .status-detail b{font-weight:600;}
  .status-detail .row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid rgba(0,0,0,0.08);padding-top:6px;margin-top:6px;}
  .status-detail .row:first-child{border-top:none;padding-top:0;margin-top:0;}
  .elapsed{
    font-family:var(--mono);
    font-size:12px;
    color:var(--warn);
    margin-top:8px;
  }

  /* form */
  .panel{
    border:1px solid var(--line);
    border-radius:4px;
    padding:16px;
    background:#fff;
    margin-bottom:18px;
  }
  label{
    display:block;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
    margin:12px 0 5px;
  }
  label:first-of-type{margin-top:0;}
  input[type=text]{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:3px;
    font-size:15px;
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
  }
  input[type=text]:focus{
    outline:2px solid var(--ink);
    outline-offset:1px;
  }
  button{
    width:100%;
    margin-top:16px;
    padding:13px;
    border:none;
    border-radius:3px;
    font-size:15px;
    font-weight:600;
    font-family:var(--sans);
    cursor:pointer;
    color:#fff;
  }
  button.primary{background:var(--ok);}
  button.primary:hover{background:#185639;}
  button.return{background:var(--warn);}
  button.return:hover{background:#943a18;}
  button:disabled{background:#b8b2a3;cursor:not-allowed;}
  .err{
    font-size:12.5px;
    color:var(--warn);
    margin-top:8px;
    display:none;
  }

  /* history */
  .hist-title{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .refresh{
    background:none;border:1px solid var(--line);color:var(--muted);
    font-family:var(--mono);font-size:10px;padding:4px 8px;width:auto;margin:0;
    border-radius:3px;text-transform:uppercase;letter-spacing:0.06em;font-weight:500;
  }
  .refresh:hover{background:var(--line);}
  .hist-item{
    border-bottom:1px solid var(--line);
    padding:9px 0;
    font-size:13px;
  }
  .hist-item:last-child{border-bottom:none;}
  .hist-top{display:flex;justify-content:space-between;font-weight:600;}
  .hist-meta{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted);
    margin-top:2px;
  }
  .empty{
    color:var(--muted);
    font-size:13px;
    font-style:italic;
    padding:6px 0;
  }
  .toast{
    position:fixed;
    bottom:18px;left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:#fff;
    padding:10px 18px;
    border-radius:4px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Unidad Coronaria · Equipamiento Compartido</div>
  <h1>Ecógrafo móvil — registro de uso</h1>

  <div id="statusCard" class="status">
    <div class="status-label" id="statusLabel">Cargando estado…</div>
    <div class="status-detail" id="statusDetail"></div>
    <div class="elapsed" id="elapsedTime"></div>
  </div>

  <div class="panel" id="actionPanel"></div>

  <div class="hist-title">
    Últimos movimientos
    <span class="refresh" id="liveIndicator" style="cursor:default;">● en vivo</span>
  </div>
  <div id="history"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase (compat SDK, sin build step — pensado para GitHub Pages) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdnVk14BaJjxMtejhWz7XfhjnXgNJq7nc",
  authDomain: "agenda-40a49.firebaseapp.com",
  databaseURL: "https://agenda-40a49-default-rtdb.firebaseio.com",
  projectId: "agenda-40a49",
  storageBucket: "agenda-40a49.firebasestorage.app",
  messagingSenderId: "692725419422",
  appId: "1:692725419422:web:8f95c1e4ffa77d6a6bda8f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const estadoRef = db.ref('ecografoMovil/estado');
const historialRef = db.ref('ecografoMovilHistorial');

let state = { current: { disponible: true }, history: [] };
let elapsedTimer = null;
let estadoCargado = false;
let historialCargado = false;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// Escucha en tiempo real: si otro médico registra algo desde su celular,
// se actualiza acá solo, sin recargar la página.
estadoRef.on('value',
  (snap) => {
    state.current = snap.exists() ? snap.val() : { disponible: true };
    estadoCargado = true;
    render();
  },
  (err) => {
    document.getElementById('liveIndicator').textContent = '● sin conexión';
    showToast('No se pudo conectar con la base de datos.');
  }
);

historialRef.orderByChild('horaDevolucion').limitToLast(30).on('value',
  (snap) => {
    const arr = [];
    snap.forEach(child => { arr.push(child.val()); });
    arr.reverse(); // más reciente primero
    state.history = arr;
    historialCargado = true;
    renderHistory();
  },
  (err) => {
    showToast('No se pudo cargar el historial.');
  }
);

async function saveEstado(nuevoEstado){
  try{
    await estadoRef.set(nuevoEstado);
  }catch(e){
    showToast('Error al guardar. Verificá la conexión.');
    throw e;
  }
}

async function agregarHistorial(entry){
  try{
    await historialRef.push(entry);
  }catch(e){
    showToast('Error al guardar el historial.');
    throw e;
  }
}

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}

function elapsedSince(iso){
  const ms = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(ms/60000);
  if(mins < 60) return `Hace ${mins} min`;
  const h = Math.floor(mins/60), m = mins%60;
  return `Hace ${h} h ${m} min`;
}

function durationBetween(startIso, endIso){
  const ms = new Date(endIso) - new Date(startIso);
  const mins = Math.round(ms/60000);
  if(mins < 60) return `${mins} min`;
  const h = Math.floor(mins/60), m = mins%60;
  return `${h} h ${m} min`;
}

function nowForInput(){
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,16);
}

function render(){
  if(!estadoCargado) return;

  const card = document.getElementById('statusCard');
  const label = document.getElementById('statusLabel');
  const detail = document.getElementById('statusDetail');
  const elapsedEl = document.getElementById('elapsedTime');
  const panel = document.getElementById('actionPanel');

  if(elapsedTimer) clearInterval(elapsedTimer);

  if(state.current.disponible){
    card.classList.remove('busy');
    label.textContent = '● Disponible';
    detail.innerHTML = '';
    elapsedEl.textContent = '';

    panel.innerHTML = `
      <div class="tag">Registrar retiro</div>
      <label for="nombre">Quién lo retira</label>
      <input type="text" id="nombre" placeholder="Nombre y apellido">
      <label for="lugar">A dónde lo lleva</label>
      <input type="text" id="lugar" placeholder="Ej: Quirófano 3, Guardia, Piso 4">
      <label for="horaSalidaInput">Horario de retiro</label>
      <input type="datetime-local" id="horaSalidaInput">
      <div class="err" id="formErr">Completá nombre y lugar.</div>
      <button class="primary" onclick="registrarRetiro()">Retirar equipo</button>
    `;
    document.getElementById('horaSalidaInput').value = nowForInput();
  } else {
    card.classList.add('busy');
    label.textContent = '● En uso';
    const c = state.current;
    detail.innerHTML = `
      <div class="row"><span>Retirado por</span><b>${escapeHtml(c.nombre)}</b></div>
      <div class="row"><span>Ubicación</span><b>${escapeHtml(c.lugar)}</b></div>
      <div class="row"><span>Hora de salida</span><b>${fmtTime(c.horaSalida)}</b></div>
    `;
    elapsedEl.textContent = elapsedSince(c.horaSalida);
    elapsedTimer = setInterval(()=>{
      elapsedEl.textContent = elapsedSince(c.horaSalida);
    }, 30000);

    panel.innerHTML = `
      <div class="tag">Registrar devolución</div>
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 4px;">
        Confirmá que el equipo fue devuelto a la unidad coronaria.
      </p>
      <label for="horaDevolucionInput">Horario de devolución</label>
      <input type="datetime-local" id="horaDevolucionInput">
      <button class="return" onclick="registrarDevolucion()">Registrar devolución</button>
    `;
    document.getElementById('horaDevolucionInput').value = nowForInput();
  }

  renderHistory();
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function registrarRetiro(){
  const nombre = document.getElementById('nombre').value.trim();
  const lugar = document.getElementById('lugar').value.trim();
  const horaInput = document.getElementById('horaSalidaInput').value;
  const err = document.getElementById('formErr');
  if(!nombre || !lugar || !horaInput){
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  const nuevoEstado = {
    disponible: false,
    nombre, lugar,
    horaSalida: new Date(horaInput).toISOString()
  };
  try{
    await saveEstado(nuevoEstado);
    showToast('Retiro registrado.');
  }catch(e){ /* el toast de error ya se mostró en saveEstado */ }
}

async function registrarDevolucion(){
  const c = state.current;
  const horaInput = document.getElementById('horaDevolucionInput').value;
  const horaDevolucion = horaInput ? new Date(horaInput).toISOString() : new Date().toISOString();
  const entry = {
    nombre: c.nombre,
    lugar: c.lugar,
    horaSalida: c.horaSalida,
    horaDevolucion
  };
  try{
    await agregarHistorial(entry);
    await saveEstado({ disponible: true });
    showToast('Devolución registrada.');
  }catch(e){ /* el toast de error ya se mostró arriba */ }
}

function renderHistory(){
  if(!historialCargado) return;
  const el = document.getElementById('history');
  const hist = state.history || [];
  if(hist.length === 0){
    el.innerHTML = '<div class="empty">Todavía no hay movimientos registrados.</div>';
    return;
  }
  el.innerHTML = hist.map(h => `
    <div class="hist-item">
      <div class="hist-top">
        <span>${escapeHtml(h.nombre)}</span>
        <span>${durationBetween(h.horaSalida, h.horaDevolucion)}</span>
      </div>
      <div class="hist-meta">${escapeHtml(h.lugar)} · salió ${fmtTime(h.horaSalida)} · volvió ${fmtTime(h.horaDevolucion)}</div>
    </div>
  `).join('');
}

// Los listeners de Firestore (onSnapshot) ya arrancan solos arriba —
// no hace falta una carga manual inicial.

</script>
</body>
</html>
